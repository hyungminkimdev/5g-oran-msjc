# srsRAN Project gNB Configuration — MSJC 5G O-RAN Testbed
# Instance-2: gNB + Near-RT RIC + 5GC
# USRP X310 at 192.168.116.2, band n78, 20 MHz BW, SCS 30 kHz

amf:
  addr: 127.0.0.5                       # Open5GS AMF NGAP listen address
  bind_addr: 10.111.143.61              # Instance-2 host IP (N2 interface)

ru_sdr:
  device_driver: uhd
  device_args: addr=192.168.116.2
  srate: 23.04                           # MHz — required by srsRAN for 20 MHz channel BW
  tx_gain: 50
  rx_gain: 45
  otw_format: sc12                       # over-the-wire format for USRP X310

cell_cfg:
  dl_arfcn: 632628                       # 3489.42 MHz center (NR band n78)
  band: 78
  channel_bandwidth_MHz: 20
  common_scs: 30                         # subcarrier spacing kHz (numerology mu=1)
  nof_antennas_dl: 1
  nof_antennas_ul: 1
  plmn: "00101"
  tac: 7
  pci: 1                                # Physical Cell ID

  pdcch:
    common:
      coreset0_index: 12
      ss0_index: 0
    dedicated:
      ss2_type: common
      dci_format_0_1_and_1_1: false

  pdsch:
    min_ue_mcs: 0
    max_ue_mcs: 28

  pusch:
    min_ue_mcs: 0
    max_ue_mcs: 28

  prach:
    prach_config_index: 1

  tdd_ul_dl_cfg:
    dl_ul_tx_period: 10                  # slots (5 ms periodicity)
    nof_dl_slots: 7
    nof_dl_symbols: 6
    nof_ul_slots: 2
    nof_ul_symbols: 4

cu_cp:
  inactivity_timer: 7200                 # seconds — keep UE connected for testing

cu_up:
  gtpu_bind_addr: 127.0.0.1             # GTP-U bind for user-plane

e2:
  enable_du_e2: true                     # enable E2 agent in the DU
  addr: 127.0.0.1                        # FlexRIC Near-RT RIC address
  port: 36421                            # E2AP SCTP port (FlexRIC default)

log:
  filename: /tmp/gnb_msjc.log
  all_level: warning
  phy_level: warning
  mac_level: info
  rrc_level: info
  pdcp_level: warning
  e2ap_level: debug                      # verbose for E2 debugging

pcap:
  mac_enable: false
  ngap_enable: false
  e2ap_enable: true                      # capture E2AP for debugging
  e2ap_filename: /tmp/gnb_e2ap.pcap
