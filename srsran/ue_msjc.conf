#####################################################################
# srsUE Configuration — MSJC 5G O-RAN Testbed
# Instance-1: UE (srsRAN 4G srsUE in 5G NR SA mode)
# USRP X310 at 192.168.114.2
#
# SA mode: rat.eutra.nof_carriers = 0 triggers NR-SA code path in ue.cc
# Band n78: 3489.6 MHz center, 10 MHz BW, 30 kHz SCS
#   SSB ARFCN 632640 = GSCN 340 => 3000 + 340*1.44 = 3489.6 MHz
#   PRBs = 24 (10 MHz @ 30 kHz SCS per 3GPP TS 38.101-1 Table 5.3.2-1)
#   srate = 11.52e6 → symbol_sz = 384
#####################################################################

[rf]
device_name = uhd
device_args = addr=192.168.114.2,num_recv_frames=4096,num_send_frames=512,master_clock_rate=184.32e6
tx_gain = 5
rx_gain = 40
freq_offset = 0
srate = 11.52e6
continuous_tx = yes

[rat.eutra]
# Set to 0 to enable NR SA mode (no LTE anchor)
nof_carriers = 0

[rat.nr]
bands = 78
nof_carriers = 1
max_nof_prb  = 24
nof_prb      = 24
dl_nr_arfcn  = 632640
ssb_nr_arfcn = 632640
scs          = 30
ssb_scs      = 30

[usim]
mode = soft
algo = milenage
opc  = E8ED289DEBA952E4283B54E88E6183CA
k    = 465B5CE8B199B49FAA5F0A2EE238A6BC
imsi = 001010123456780
imei = 353490069873319

[rrc]
release = 15

[nas]
apn = internet
apn_protocol = ipv4

[gw]
netns =
ip_devname = tun_srsue
ip_netmask = 255.255.255.0

[gui]
enable = false

[log]
all_level = warning
all_hex_limit = 32
filename = /tmp/srsue_msjc.log
file_max_size = -1
phy_level = warning
phy_lib_level = none
mac_level = warning
rrc_level = debug

[general]
metrics_period_secs = 1.0
metrics_csv_enable = false
