#####################################################################
# srsUE Configuration — MSJC 5G O-RAN Testbed
# Instance-1: UE (srsRAN 4G srsUE in 5G NR SA mode)
# USRP X310 at 192.168.114.2
#####################################################################

[rf]
device_name = uhd
device_args = addr=192.168.114.2
tx_gain = 70
rx_gain = 40
freq_offset = 0
srate = 23.04e6

[rat.nr]
bands = 78
nof_carriers = 1

[rat.nr.dl]
# DL ARFCN matching gNB
arfcn = 632628

[rat.nr.ul]
# UL ARFCN auto-derived from band n78 TDD (same as DL)

[pcell]
# Primary cell config — must match gNB cell_cfg
dl_arfcn = 632628

[usim]
mode = soft
algo = xor
opc  = 63BFA50EE6523365FF14C1F45F88737D
k    = 00112233445566778899AABBCCDDEEFF
imsi = 001010123456780
imei = 353490069873319

[nas]
apn = internet
apn_protocol = ipv4

[gw]
netns =
ip_devname = tun_srsue
ip_netmask = 255.255.255.0

[gui]
enable = false

[log]
all_level = warning
all_hex_limit = 32
filename = /tmp/srsue_msjc.log
file_max_size = -1
rrc_level = info
nas_level = info
phy_level = warning
mac_level = warning

[general]
# Enable 5G NR SA mode
release = 15
