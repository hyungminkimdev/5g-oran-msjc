#####################################################################
# srsUE Configuration — MSJC 5G O-RAN Testbed
# Instance-1: UE (srsRAN 4G srsUE in 5G NR SA mode)
# USRP X310 at 192.168.114.2
#
# SA mode: rat.eutra.nof_carriers = 0 triggers NR-SA code path in ue.cc
# Band n78: 3489.42 MHz center, 20 MHz BW, 30 kHz SCS
#   ARFCN 632628 = 3000 + (632628-600000)*0.015 = 3489.42 MHz
#   SSB ARFCN 632640 = GSCN 340 => 3000 + 340*1.44 = 3489.6 MHz
#   PRBs = 51 (20 MHz @ 30 kHz SCS per 3GPP TS 38.101-1 Table 5.3.2-1)
#####################################################################

[rf]
device_name = uhd
device_args = addr=192.168.114.2
tx_gain = 70
rx_gain = 40
freq_offset = 0
srate = 23.04e6

[rat.eutra]
# Set to 0 to enable NR SA mode (no LTE anchor)
nof_carriers = 0

[rat.nr]
bands = 78
nof_carriers = 1
max_nof_prb  = 106
nof_prb      = 51
dl_nr_arfcn  = 632628
ssb_nr_arfcn = 632640
scs          = 30
ssb_scs      = 30

[usim]
mode = soft
algo = xor
opc  = 63BFA50EE6523365FF14C1F45F88737D
k    = 00112233445566778899AABBCCDDEEFF
imsi = 001010123456780
imei = 353490069873319

[rrc]
release = 15

[nas]
apn = internet
apn_protocol = ipv4

[gw]
netns =
ip_devname = tun_srsue
ip_netmask = 255.255.255.0

[gui]
enable = false

[log]
all_level = info
all_hex_limit = 32
filename = /tmp/srsue_msjc.log
file_max_size = -1
phy_level = warning
mac_level = warning

[general]
metrics_period_secs = 1.0
metrics_csv_enable = false
