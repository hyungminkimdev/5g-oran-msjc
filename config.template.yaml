# MSJC Project - Common Configuration (TEMPLATE)
# 5G O-RAN Hierarchical Jamming Classification (CCI xG Testbed)
#
# 사용법: cp config.template.yaml config.yaml
#         config.yaml 에서 토큰 등 인스턴스별 값 입력
#         config.yaml 은 .gitignore 처리됨 — git에 커밋하지 말 것

# ─────────────────────────────────────────────
# Network / Infrastructure
# ─────────────────────────────────────────────
network:
  # gateway: 미사용 — ZeroTier 직접 연결로 전환 (ProxyJump 없음)
  # 물리적 순서: Classifier → Jammer → UE
  nodes:
    instance2_classifier:
      ip: "10.111.143.143"       # ZeroTier network: d5cc70b949
      role: "Classifier/RIC"
      usrp:
        ip: "192.168.116.2"
        serial: "323DF42"
        interface: "ens5"
        mtu: 9000

    instance3_jammer:
      ip: "10.111.143.61"        # ZeroTier network: e51276b157
      role: "Jammer"
      usrp:
        ip: "192.168.115.2"
        serial: "323EE55"
        interface: "ens5"
        mtu: 9000

    instance1_ue:
      ip: "10.111.143.165"       # ZeroTier network: b92226be69
      role: "UE"
      usrp:
        ip: "192.168.114.2"
        serial: "323DF47"
        interface: "ens5"
        mtu: 9000

# ─────────────────────────────────────────────
# MSJC Pipeline
# ─────────────────────────────────────────────
pipeline:
  stage1_mlp:
    task: "binary_anomaly_detection"
    max_latency_ms: 5

  stage2_ksvm:
    task: "physical_jamming_classification"
    max_latency_ms: 20

  stage3_mobilenetv3:
    task: "semantic_spectrogram_analysis"
    input_size: [224, 224]
    max_latency_ms: 100

  oran_ric:
    timing: "near_rt"
    latency_range_ms: [10, 1000]

# ─────────────────────────────────────────────
# SDR / UHD
# ─────────────────────────────────────────────
sdr:
  driver: "uhd"
  stream_interface: "ens5"
  mtu: 9000
  snapshot_on_stage3: true        # xApp 모드에서 Stage3 트리거 시 I/Q 온디맨드 캡처

# ─────────────────────────────────────────────
# O-RAN Interfaces
# ─────────────────────────────────────────────
oran:
  e2:
    ric_addr: "127.0.0.1"          # FlexRIC Near-RT RIC 주소
    ric_port: 36421                 # E2AP SCTP 포트 (FlexRIC default)
    report_period_ms: 100           # E2SM-KPM 보고 주기 (Near-RT RIC: 10ms~1s)
    e2sm_rc_enabled: false          # E2SM-RC 제어 활성화 (true: 재밍 탐지 시 gNB 제어)

  gnb:
    srsran_config: "srsran/gnb_msjc.yaml"   # srsRAN gNB 설정 파일 경로
    e2_agent_addr: "127.0.0.1"              # gNB E2 에이전트 bind 주소

# ─────────────────────────────────────────────
# Data & MLOps
# ─────────────────────────────────────────────
data:
  influxdb:
    enabled: true
    url: "http://localhost:8086"
    token: "YOUR_INFLUXDB_TOKEN_HERE"   # `influx auth list` 로 확인 후 붙여넣기
    org: "msjc"
    bucket: "jamming_kpi"
    batch_size: 100
    flush_interval_ms: 5000

  clearml:
    purpose: "Model management and retraining"

# ─────────────────────────────────────────────
# ClearML MLOps
# ─────────────────────────────────────────────
clearml:
  enabled: false                    # ClearML 서버 연결 가능 시 true로 변경
  project_name: "msjc-5g-oran"
  queue_name: "default"
  fn_rate_retrain_threshold: 0.05   # FN율 > 5% 시 재학습 자동 큐 등록

# ─────────────────────────────────────────────
# Model Update Policy
# ─────────────────────────────────────────────
model_update:
  strategy: "in_place"              # 서비스 중단 없이 가중치 교체 (hot-reload)
  check_interval_sec: 60            # 모델 파일 변경 감지 주기 (초)
